services:
  influxdb:
    image: influxdb:2.7
    container_name: pen_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: srh
      DOCKER_INFLUXDB_INIT_BUCKET: pen_line
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: pen-token
    volumes:
      - pen_influxdb_data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:latest
    container_name: pen_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - influxdb
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

volumes:
  pen_influxdb_data:
